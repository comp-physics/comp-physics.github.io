<style>
  /* Pagefind Component UI theme — matches site's dark surface + gold accent */
  :root {
    --pf-text:            var(--text-primary);
    --pf-text-secondary:  var(--text-muted);
    --pf-text-muted:      var(--text-muted);
    --pf-background:      var(--surface);
    --pf-border:          var(--border);
    --pf-border-focus:    var(--gold);
    --pf-hover:           var(--surface-raised);
    --pf-mark:            var(--gold-light);
    --pf-skeleton:        var(--surface-raised);
    --pf-skeleton-shine:  var(--border);
    --pf-scroll-shadow:   rgba(0, 0, 0, 0.3);

    --pf-shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.35);
    --pf-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.45);
    --pf-shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);

    --pf-outline-focus: var(--gold);
    --pf-font: inherit;

    --pf-input-height:   34px;
    --pf-border-radius:  4px;
    --pf-modal-max-width:  720px;
    --pf-modal-max-height: min(72dvh, 640px);
    --pf-modal-top:        12dvh;
  }

  /* Navbar trigger: transparent, icon-only, fits the dark navbar */
  .nav-search-trigger {
    --pf-background: transparent;
    --pf-border: transparent;
    --pf-text: #ffffff;
    --pf-hover: rgba(255, 255, 255, 0.1);
    --pf-input-height: 32px;
  }
</style>

<pagefind-modal></pagefind-modal>
